name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch on new pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Swift tests — runs on arm64: macos-14 (Sonoma) + macos-15 (Sequoia) ────
  # Note: GitHub-hosted macOS runners are arm64 only (Apple Silicon).
  # x86_64 Intel compatibility is validated via cross-compilation in build-universal.
  swift-tests:
    name: Swift tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        # macos-14 ships Xcode 15.x; macos-13 ships Xcode 14.x/15.x.
        # Use the latest stable Xcode available on the runner.
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"

      - name: Print toolchain info
        run: |
          swift --version
          xcode-select -p

      - name: Resolve Swift packages
        working-directory: clipsterd
        run: swift package resolve

      - name: Build (debug)
        working-directory: clipsterd
        run: swift build

      - name: Run Swift tests (bounded)
        working-directory: clipsterd
        run: |
          echo "→ Running Swift tests on $(sw_vers -productName) $(sw_vers -productVersion) ($(uname -m))"
          # macos-15 occasionally leaves swift test hanging after output completion.
          # Run with an explicit timeout guard so the workflow can progress/fail deterministically.
          python3 - <<'PYEOF'
import os, signal, subprocess, sys, threading

TIMEOUT_SEC = 5 * 60
proc = subprocess.Popen(["swift", "test"], stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True, bufsize=1)

def watchdog():
    try:
        proc.wait(timeout=TIMEOUT_SEC)
    except subprocess.TimeoutExpired:
        print(f"\n✗ swift test exceeded {TIMEOUT_SEC}s timeout; terminating...", flush=True)
        proc.terminate()
        try:
            proc.wait(timeout=10)
        except subprocess.TimeoutExpired:
            proc.kill()
        sys.exit(124)

threading.Thread(target=watchdog, daemon=True).start()
for line in proc.stdout:
    print(line, end="")
code = proc.wait()
sys.exit(code)
PYEOF

  # ─── Go tests — runs on arm64 (macos-14) ─────────────────────────────────────
  go-tests:
    name: Go tests (macos-14)
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: clipster-client/go.mod
          cache-dependency-path: clipster-client/go.sum

      - name: Print Go info
        run: go version

      - name: Build Go client
        working-directory: clipster-client
        run: go build ./...

      - name: Run Go tests
        working-directory: clipster-client
        run: |
          echo "→ Running Go tests on $(sw_vers -productName) $(sw_vers -productVersion) ($(uname -m))"
          time go test ./... -v 2>&1

  # ─── Universal binary build — arm64 (native) + x86_64 (cross-compiled) ──────
  build-universal:
    name: Build universal binary
    runs-on: macos-14
    timeout-minutes: 30
    needs: [swift-tests, go-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: clipster-client/go.mod
          cache-dependency-path: clipster-client/go.sum

      - name: Resolve Swift packages
        working-directory: clipsterd
        run: swift package resolve

      - name: Build arm64
        working-directory: clipsterd
        run: swift build -c release --arch arm64

      - name: Build x86_64
        working-directory: clipsterd
        run: swift build -c release --arch x86_64

      - name: Lipo universal binary
        run: |
          mkdir -p dist
          lipo -create \
            clipsterd/.build/arm64-apple-macosx/release/clipsterd \
            clipsterd/.build/x86_64-apple-macosx/release/clipsterd \
            -output dist/clipsterd-universal
          file dist/clipsterd-universal
          ls -lh dist/clipsterd-universal

      - name: Build Go client (arm64)
        working-directory: clipster-client
        run: GOARCH=arm64 GOOS=darwin go build -o ../dist/clipster-arm64 ./cmd/clipster

      - name: Build Go client (x86_64)
        working-directory: clipster-client
        run: GOARCH=amd64 GOOS=darwin go build -o ../dist/clipster-x86_64 ./cmd/clipster

      - name: Upload binaries as artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipster-universal-${{ github.sha }}
          path: dist/
          retention-days: 14
